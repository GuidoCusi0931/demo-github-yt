{% extends 'base.html' %}

{% block titulo %}Registrarse - Sistema de Mensajes{% endblock %}

{% block contenido %}
<div class="row justify-content-center my-5">
    <div class="col-12 col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="fw-bold text-center mb-4">📝 Crear Cuenta</h2>
                <form action="/registro" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control" placeholder="nombre@correo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="Crea una contraseña segura" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">Registrar Cuenta</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/login" class="text-decoration-none small">¿Ya tienes cuenta? Inicia sesión</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
