<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Mensaje</title>
</head>
<body>
    <h1>✏️ Editar Mensaje #{{ mensaje['id'] }}</h1>

    <form action="/editar/{{ mensaje['id'] }}" method="POST">
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre" value="{{ mensaje['nombre'] }}" required><br><br>

        <label for="mensaje">Mensaje:</label><br>
        <textarea id="mensaje" name="mensaje" required>{{ mensaje['mensaje'] }}</textarea><br><br>

        <button type="submit">Guardar Cambios</button>
        <a href="/mensajes">Cancelar</a>
    </form>
</body>
</html>
