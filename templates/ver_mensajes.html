{% extends 'base.html' %}

{% block titulo %}Bandeja de Entrada{% endblock %}

{% block contenido %}
<div class="row">
    <div class="col-12">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark fw-bold">📥 Mensajes Recibidos</h2>
            <a href="/contacto" class="btn btn-primary shadow-sm">+ Nuevo Mensaje</a>
        </div>

        <div class="table-responsive card shadow-sm">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 10%">ID</th>
                        <th style="width: 25%">Nombre</th>
                        <th>Mensaje</th>
                        <th style="width: 20%" class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for fila in lista_mensajes %}
                    <tr>
                        <td><span class="badge bg-secondary">#{{ fila['id'] }}</span></td>
                        <td class="fw-bold text-secondary">{{ fila['nombre'] }}</td>
                        <td>{{ fila['mensaje'] }}</td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a href="/editar/{{ fila['id'] }}" class="btn btn-warning text-dark">✏️ Editar</a>
                                <a href="/eliminar/{{ fila['id'] }}" class="btn btn-danger" onclick="return confirm('¿Seguro de borrar?');">🗑️</a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</div>
{% endblock %}
